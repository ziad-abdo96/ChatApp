<!DOCTYPE html>
<html>
<head>
    <title>ChatApp</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        #messages {
            height: 300px;
            border: 1px solid #ccc;
            overflow-y: auto;
            margin-bottom: 10px;
            padding: 10px;
            scroll-behavior: smooth;
        }

        .msg {
            padding: 8px 12px;
            margin: 6px 0;
            width: fit-content;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .msg.me {
            background: #0078ff;
            color: white;
            margin-left: auto;
        }

        .msg.other {
            background: #eee;
            color: black;
        }

        .top-bar {
            margin-bottom: 15px;
        }

        input, select, button {
            padding: 8px;
            margin: 5px;
        }

        #connectBtn {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h2>💬 ChatApp</h2>

    <div id="messages"></div>

    <div class="top-bar">
        <input id="token" placeholder="Enter JWT Token.." style="width: 300px;" />
        <button id="connectBtn" onclick="handleConnect()">Connect</button>
    </div>

    <hr />

    <select id="receiverIdSelect"  onchange="loadConversation()">
        <option value="">Select User</option>
    </select>


    <input id="message" onkeydown="clickEnter(event)" placeholder="type message..." />
    <button onclick="sendMessage()">Send</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>

    <script>

        let connection;

        
        function handleConnect() {

            const token = document.getElementById("token").value;

            if (!token.trim()) {
                alert("Please enter token");
                return;
            }

            startConnection();
        }

        function startConnection() {

            const btn = document.getElementById("connectBtn");

            btn.disabled = true;
            btn.textContent = "Connecting...";

            connection = new signalR.HubConnectionBuilder()
                .withUrl("/chat", {
                    accessTokenFactory: () => document.getElementById("token").value
                })
                .build();

       
            connection.on("ReceiveMessage", (user, message) => {

                const div = document.createElement("div");
                div.className = "msg other";
                div.textContent = `${user}: ${message}`;

                const messages = document.getElementById("messages");
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            });

            connection.start()
                .then(() => {
                    console.log("Connected");

                    btn.textContent = "Connected";
                    btn.style.backgroundColor = "green";
                    btn.style.color = "white";

                    loadUsers();
                })
                .catch(err => {
                    console.error(err);

                    btn.disabled = false;
                    btn.textContent = "Connect";
                });
        }

        async function loadUsers() {

            const response = await fetch("/api/users", {
                headers: {
                    "Authorization": "Bearer " + document.getElementById("token").value
                }
            });

            if (!response.ok) {
                console.log("Failed to load users:", response.status);
                return;
            }

            const users = await response.json();

            const select = document.getElementById("receiverIdSelect");

            users.forEach(user => {

                const option = document.createElement("option");

                option.value = user.id;
                option.textContent = user.userName;

                select.appendChild(option);
            });
        }

        async function loadConversation() {

            const receiverId = parseInt(document.getElementById("receiverIdSelect").value);

            if (!receiverId)
                return;

            const response = await fetch(`/api/Message/conversation/${receiverId}`, {
                headers: {
                    "Authorization": "Bearer " + document.getElementById("token").value
                }
            });

            const messages = await response.json();

            const messagesDiv = document.getElementById("messages");

            messagesDiv.innerHTML = "";

            const token = document.getElementById("token").value;
            const payload = JSON.parse(atob(token.split('.')[1]));
            const currentUserId = parseInt(payload.nameid);

            messages.forEach(msg => {

                const div = document.createElement("div");

                div.className = msg.senderId === currentUserId ? "msg me" : "msg other";

                div.textContent = `${msg.senderName}: ${msg.content}`;

                messagesDiv.appendChild(div);
            });

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
      
        function sendMessage() {

            const input = document.getElementById("message");
            const text = input.value;

            if (!text.trim()) return;

            const receiverId = parseInt(document.getElementById("receiverIdSelect").value);

            if (!receiverId) {
                alert("Select user first");
                return;
            }

       
            const div = document.createElement("div");
            div.className = "msg me";
            div.textContent = `Me: ${text}`;

            const messages = document.getElementById("messages");
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;

            input.value = "";


            if (connection && connection.state === "Connected") {
                connection.invoke("SendMessage", receiverId, text);
            }
        }


        function clickEnter(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

    </script>

</body>
</html>
